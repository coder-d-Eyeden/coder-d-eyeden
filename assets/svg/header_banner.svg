```xml
<svg width="1600" height="500"
viewBox="0 0 1600 500"
xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Neon Gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40"
      fill="none"
      stroke="#1e293b"
      stroke-width="1"/>
    </pattern>

    <style>

      .title {
        font-family: monospace;
        font-size: 118px;
        font-weight: bold;
        letter-spacing: 8px;
        fill: url(#neon);
        filter: url(#glow);
      }

      .subtitle {
        font-family: monospace;
        font-size: 20px;
        fill: #cbd5e1;
        letter-spacing: 2px;
      }

      .small {
        font-family: monospace;
        font-size: 18px;
        fill: #94a3b8;
        letter-spacing: 2px;
      }

      .cursor {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,100% { opacity: 1; }
        50% { opacity: 0; }
      }

    </style>

  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="100%" height="100%"
  fill="url(#grid)"
  opacity="0.35"/>

  <!-- Left Hexagon -->
  <polygon
  points="180,120 210,140 210,180 180,200 150,180 150,140"
  fill="none"
  stroke="#06b6d4"
  stroke-width="2"
  opacity="0.5"/>

  <!-- Right Hexagon -->
  <polygon
  points="1420,300 1450,320 1450,360 1420,380 1390,360 1390,320"
  fill="none"
  stroke="#8b5cf6"
  stroke-width="2"
  opacity="0.5"/>

  <!-- Side Bars -->
  <rect
  x="120"
  y="160"
  width="5"
  height="180"
  fill="#06b6d4"
  filter="url(#glow)">

    <animate
    attributeName="height"
    values="140;180;140"
    dur="3s"
    repeatCount="indefinite"/>

  </rect>

  <rect
  x="1475"
  y="160"
  width="5"
  height="180"
  fill="#8b5cf6"
  filter="url(#glow)">

    <animate
    attributeName="height"
    values="140;180;140"
    dur="3s"
    repeatCount="indefinite"/>

  </rect>

  <!-- Main Text -->
  <text
  x="800"
  y="250"
  text-anchor="middle"
  class="title">
    RUBEL ROY
  </text>

  <!-- Cursor -->
  <rect
  x="1125"
  y="145"
  width="7"
  height="110"
  fill="#06b6d4"
  class="cursor"
  filter="url(#glow)"/>

  <!-- Subtitle -->
  <text
  x="800"
  y="320"
  text-anchor="middle"
  class="subtitle">
    DATA SCIENCE • MACHINE LEARNING • AI SYSTEMS
  </text>

  <!-- Small Subtitle -->
  <text
  x="800"
  y="355"
  text-anchor="middle"
  class="small">
    Building Intelligent Systems with Code &amp; Curiosity
  </text>

  <!-- Bottom Line -->
  <line
  x1="300"
  y1="420"
  x2="1300"
  y2="420"
  stroke="url(#neon)"
  stroke-width="2"
  opacity="0.8"/>

  <!-- Moving Pulse -->
  <circle
  r="5"
  fill="#06b6d4"
  filter="url(#glow)">

    <animateMotion
    dur="4s"
    repeatCount="indefinite"
    path="M300 420 L1300 420"/>

  </circle>

  <!-- Center Status -->
  <text
  x="800"
  y="445"
  text-anchor="middle"
  font-family="monospace"
  font-size="24"
  fill="url(#neon)"
  filter="url(#glow)">
    [ SYSTEM ONLINE ]
  </text>

</svg>
```
